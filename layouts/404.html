{{ define "main" }}
{{- $desc := i18n "nf_desc" -}}
<div class="not-prose">
  <section class="error-404">
    <img src="{{ "img/logo.webp" | relURL }}" alt="" class="error-404-mascot" width="96" height="85" />
    <p class="error-404-code">404</p>
    <h1 class="error-404-title">{{ i18n "nf_title" }}</h1>
    <p class="error-404-desc">{{ $desc }}</p>
    <div class="error-404-actions">
      <a class="bento-cta" href="{{ relLangURL "" }}">{{ i18n "nf_home" }}</a>
      <a class="bento-cta-2" href="{{ relLangURL "posts/" }}">{{ i18n "nf_posts" }}</a>
    </div>
  </section>
</div>
{{ end }}
